<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finini Grocery Receipt Generator</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
        }
        h1, h2 {
            color: lightgreen;
        }
        h3 {
            color: lightblue;
        }
        .checkout-btn {
            background-color: lightblue;
            color: black;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .checkout-btn:hover {
            background-color: #4CAF50;
            color: white;
        }
        #barcode {
            margin-top: 20px;
            display: none;
        }
        #receiptDetails {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Finini Grocery Store</h1>
    <h2>Get Your Groceries Automatically</h2>

    <p>Click below to generate a barcode for your food package:</p>

    <button class="checkout-btn" onclick="generateBarcode()">Get My Groceries</button>

    <h3 id="barcodeHeader" style="display:none;">SCAN THIS BARCODE AT A LOCAL GROCERY STORE!</h3>
    <div id="receiptDetails"></div>
    
    <div id="barcode"></div>

    <!-- Barcode Generator Library -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>

    <script>
        // Fixed UPC codes for the predefined food package
        const foodPackageUPC = [
            '012345678901', '234567890123', '345678901234',
            '456789012345', '567890123456', '678901234567',
            '789012345678', '890123456789', '901234567890'
        ];

        // Function to generate the barcode
        function generateBarcode() {
            // Combine the 9 UPC codes into a single string
            const barcodeData = foodPackageUPC.join('');

            // Display a message for barcode scanning
            document.getElementById('barcodeHeader').style.display = 'block';
            document.getElementById('receiptDetails').innerHTML = '<h2>Your Food Package Barcode:</h2>';

            // Generate Barcode (using JsBarcode for UPC encoding)
            JsBarcode("#barcode", barcodeData, {
                format: "UPC",
                lineColor: "#ffffff",  // White barcode lines
                width: 3,
                height: 100,
                displayValue: false  // Don't display the numeric value under the barcode
            });

            // Display the Barcode
            document.getElementById('barcode').style.display = 'block';
        }
    </script>
</body>
</html>
